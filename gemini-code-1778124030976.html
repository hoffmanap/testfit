<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Paso 3D Feasibility Pro - v6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        #rendererContainer { width: 100%; height: 100%; background: #0f172a; }
        .sidebar { height: 100vh; overflow-y: auto; scrollbar-width: thin; }
        input[type=range] { accent-color: #4f46e5; height: 5px; width: 100%; }
        .control-group { border-bottom: 1px solid #f1f5f9; padding-bottom: 1rem; margin-bottom: 1rem; }
    </style>
</head>
<body class="flex text-slate-800">

    <div class="sidebar w-80 bg-white p-5 z-10 border-r border-slate-200 flex flex-col">
        <header class="mb-6">
            <h1 class="text-lg font-black tracking-tighter">EL PASO <span class="text-indigo-600">3D PRO</span></h1>
            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Compliance Engine v6.0</p>
        </header>

        <div class="flex-1 overflow-y-auto pr-1">
            <div class="control-group">
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">Zoning & Use</label>
                <select id="zoning" class="w-full p-2 text-sm bg-slate-50 border border-slate-200 rounded mb-2" onchange="populateUses()"></select>
                <select id="use" class="w-full p-2 text-sm bg-slate-50 border border-slate-200 rounded" onchange="runAnalysis()"></select>
            </div>

            <div class="control-group">
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-3">Site Dimensions</label>
                <div class="space-y-3">
                    <div>
                        <div class="flex justify-between text-[11px] font-medium mb-1"><span>Lot Width</span><span id="val-w" class="font-bold text-indigo-600">150'</span></div>
                        <input type="range" id="width" min="20" max="500" value="150" oninput="runAnalysis()">
                    </div>
                    <div>
                        <div class="flex justify-between text-[11px] font-medium mb-1"><span>Lot Depth</span><span id="val-d" class="font-bold text-indigo-600">200'</span></div>
                        <input type="range" id="depth" min="20" max="500" value="200" oninput="runAnalysis()">
                    </div>
                </div>
            </div>

            <div class="control-group">
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-3">Building Footprint</label>
                <div class="space-y-3">
                    <div>
                        <div class="flex justify-between text-[11px] font-medium mb-1"><span>Bldg Width</span><span id="val-bw" class="font-bold text-indigo-600">60'</span></div>
                        <input type="range" id="bWidth" min="10" max="500" value="60" oninput="runAnalysis()">
                    </div>
                    <div>
                        <div class="flex justify-between text-[11px] font-medium mb-1"><span>Bldg Depth</span><span id="val-bd" class="font-bold text-indigo-600">60'</span></div>
                        <input type="range" id="bDepth" min="10" max="500" value="60" oninput="runAnalysis()">
                    </div>
                    <div>
                        <div class="flex justify-between text-[11px] font-medium mb-1"><span>Stories</span><span id="val-floors" class="font-bold text-indigo-600">2</span></div>
                        <input type="range" id="floors" min="1" max="15" value="2" oninput="runAnalysis()">
                    </div>
                </div>
            </div>

            <div class="control-group border-none">
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-3">Program</label>
                <div>
                    <div class="flex justify-between text-[11px] font-medium mb-1"><span>Units</span><span id="val-units" class="font-bold text-indigo-600">4</span></div>
                    <input type="range" id="units" min="1" max="145" value="4" oninput="runAnalysis()">
                </div>
                <div class="mt-4 p-3 bg-slate-50 rounded text-center">
                    <p class="text-[9px] font-bold text-slate-400 uppercase">Total Square Footage</p>
                    <p id="val-tsf" class="text-lg font-black text-slate-700">0 SF</p>
                </div>
            </div>
        </div>

        <div id="zoning-summary" class="mt-auto pt-4 border-t border-slate-100 text-[10px] text-slate-500 leading-relaxed italic"></div>
    </div>

    <div class="flex-1 relative">
        <div id="rendererContainer"></div>
        <div class="absolute bottom-6 left-6 flex gap-4 bg-white/90 p-3 rounded border border-slate-200 shadow-xl text-[10px] font-bold">
            <div class="flex items-center"><span class="w-3 h-3 bg-[#22c55e] mr-2 rounded"></span> Setbacks</div>
            <div class="flex items-center"><span class="w-3 h-3 border-2 border-dashed border-black mr-2 rounded"></span> Buildable</div>
            <div class="flex items-center"><span class="w-3 h-3 bg-[#1e293b] mr-2 rounded"></span> Parking</div>
        </div>
    </div>

    <script>
        const zoneData = [
            { zone: "R-4", use: "Two-family dwelling (Duplex)", minLot: 7000, minW: 70, minD: 90, f: 10, r: 10, s: 5, height: 35, density: 2 },
            { zone: "A-O", use: "Apartments and Mixed Use", minLot: 6000, minW: 50, minD: 90, f: 0, r: 25, s: 5, height: 45, density: 145 },
            { zone: "A-1", use: "Apartments and Mixed Use", minLot: 24000, minW: 60, minD: 100, f: 20, r: 25, s: 5, height: 45, density: 145 },
            { zone: "A-2", use: "Apartments and Mixed Use", minLot: 6000, minW: 50, minD: 100, f: 0, r: 25, s: 5, height: 45, density: 145 },
            { zone: "A-3", use: "Apartments and Mixed Use", minLot: 4000, minW: 50, minD: 80, f: 0, r: 20, s: 4, height: 45, density: 145 },
            { zone: "A-4", use: "Apartments and Mixed Use", minLot: 4000, minW: 50, minD: 80, f: 0, r: 20, s: 4, height: 45, density: 145 },
            { zone: "C-1", use: "Apartments and Mixed Use", minLot: 4000, minW: 50, minD: 50, f: 0, r: 10, s: 5, height: 45, density: 145 },
            { zone: "C-2", use: "Apartments and Mixed Use", minLot: 4000, minW: 50, minD: 50, f: 0, r: 10, s: 5, height: 45, density: 145 },
            { zone: "C-3", use: "Apartments and Mixed Use", minLot: 4000, minW: 50, minD: 50, f: 0, r: 10, s: 5, height: 45, density: 145 },
            { zone: "C-4", use: "Apartments and Mixed Use", minLot: 4000, minW: 50, minD: 50, f: 0, r: 10, s: 5, height: 60, density: 145 },
            { zone: "C-5", use: "Apartments and Mixed Use", minLot: 4000, minW: 50, minD: 50, f: 0, r: 0, s: 0, height: 100, density: 145 },
            { zone: "G-MU", use: "Apartments and Mixed Use", minLot: 130680, minW: 150, minD: 150, f: 0, r: 0, s: 0, height: 200, density: 145 },
            { zone: "R-MU", use: "Apartments and Mixed Use", minLot: 43560, minW: 100, minD: 100, f: 0, r: 0, s: 0, height: 45, density: 145 },
            { zone: "U-P", use: "Apartments and Mixed Use", minLot: 4000, minW: 50, minD: 100, f: 0, r: 0, s: 0, height: 45, density: 145 },
            { zone: "PR-1", use: "Apartments and Mixed Use", minLot: 43560, minW: 40, minD: 100, f: 10, r: 10, s: 10, height: 45, density: 145 },
            { zone: "PR-2", use: "Apartments and Mixed Use", minLot: 43560, minW: 40, minD: 100, f: 10, r: 10, s: 10, height: 45, density: 145 }
        ];

        let scene, camera, renderer, controls, lot, buildableOutline, buildingGroup, parkingLot, stalls;

        function init3D() {
            const container = document.getElementById('rendererContainer');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf1f5f9);

            camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 1, 3000);
            camera.position.set(300, 250, 300);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const light = new THREE.DirectionalLight(0xffffff, 0.6);
            light.position.set(100, 300, 100);
            light.castShadow = true;
            scene.add(light);

            lot = new THREE.Mesh(new THREE.PlaneGeometry(1,1), new THREE.MeshPhongMaterial({color: 0x22c55e}));
            lot.rotation.x = -Math.PI / 2;
            scene.add(lot);

            parkingLot = new THREE.Mesh(new THREE.PlaneGeometry(1,1), new THREE.MeshPhongMaterial({color: 0x1e293b}));
            parkingLot.rotation.x = -Math.PI / 2;
            parkingLot.position.y = 0.05;
            scene.add(parkingLot);

            buildingGroup = new THREE.Group();
            scene.add(buildingGroup);

            stalls = new THREE.Group();
            scene.add(stalls);

            populateZones();
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        function populateZones() {
            const zSelect = document.getElementById('zoning');
            [...new Set(zoneData.map(d => d.zone))].forEach(z => {
                const opt = document.createElement('option');
                opt.value = opt.text = z;
                zSelect.appendChild(opt);
            });
            populateUses();
        }

        function populateUses() {
            const z = document.getElementById('zoning').value;
            const uSelect = document.getElementById('use');
            uSelect.innerHTML = '';
            zoneData.filter(d => d.zone === z).forEach((d, i) => {
                const opt = document.createElement('option');
                opt.value = i; opt.text = d.use;
                uSelect.appendChild(opt);
            });
            runAnalysis();
        }

        function runAnalysis() {
            const zVal = document.getElementById('zoning').value;
            const useIdx = document.getElementById('use').value;
            const z = zoneData.filter(d => d.zone === zVal)[useIdx];
            
            let lw = parseInt(document.getElementById('width').value);
            let ld = parseInt(document.getElementById('depth').value);
            
            // Min Lot Enforcement
            if (lw < z.minW) lw = z.minW;
            if (ld < z.minD) ld = z.minD;
            if ((lw * ld) < z.minLot) { const r = Math.sqrt(z.minLot / (lw*ld)); lw = Math.ceil(lw*r); ld = Math.ceil(ld*r); }
            
            // Buildable Constraints
            const maxBW = lw - (z.s * 2);
            const maxBD = ld - z.f - z.r;
            
            let bw = parseInt(document.getElementById('bWidth').value);
            let bd = parseInt(document.getElementById('bDepth').value);
            if(bw > maxBW) bw = maxBW;
            if(bd > maxBD) bd = maxBD;
            
            document.getElementById('bWidth').max = maxBW;
            document.getElementById('bDepth').max = maxBD;

            // Program
            const floors = parseInt(document.getElementById('floors').value);
            const maxUnits = z.density > 2 ? Math.floor((lw * ld / 43560) * z.density) : z.density;
            let units = parseInt(document.getElementById('units').value);
            if(units > maxUnits) units = maxUnits;
            document.getElementById('units').max = maxUnits;

            // Update UI
            document.getElementById('val-w').innerText = lw + "'";
            document.getElementById('val-d').innerText = ld + "'";
            document.getElementById('val-bw').innerText = bw + "'";
            document.getElementById('val-bd').innerText = bd + "'";
            document.getElementById('val-units').innerText = units;
            document.getElementById('val-floors').innerText = floors;
            document.getElementById('val-tsf').innerText = (bw * bd * floors).toLocaleString() + " SF";

            // Visuals
            lot.scale.set(lw, ld, 1);
            
            // Reset Outline
            if(buildableOutline) scene.remove(buildableOutline);
            const outlineGeo = new THREE.EdgesGeometry(new THREE.PlaneGeometry(maxBW, maxBD));
            const outlineMat = new THREE.LineDashedMaterial({color: 0x000000, dashSize: 2, gapSize: 1});
            buildableOutline = new THREE.LineSegments(outlineGeo, outlineMat);
            buildableOutline.computeLineDistances();
            buildableOutline.rotation.x = -Math.PI / 2;
            buildableOutline.position.set(0, 0.1, (ld/2) - z.r - (maxBD/2));
            scene.add(buildableOutline);

            // Parking
            const pkgNeeded = units * 325; // standard SF per unit with aisle
            const pDepth = Math.min(maxBD * 0.5, pkgNeeded / maxBW);
            parkingLot.scale.set(maxBW, pDepth, 1);
            parkingLot.position.z = (ld/2) - z.r - (pDepth / 2);

            // Stalls
            while(stalls.children.length > 0) stalls.remove(stalls.children[0]);
            for(let i=0; i<Math.floor(maxBW/9); i++) {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.2, 18), new THREE.MeshBasicMaterial({color: 0xffffff}));
                line.rotation.x = -Math.PI / 2;
                line.position.set(-maxBW/2 + (i*9), 0.08, (ld/2) - z.r - 9);
                stalls.add(line);
            }

            // Building
            updateBuilding(bw, bd, floors, z, ld);
            
            document.getElementById('zoning-summary').innerText = `Compliance: Max ${maxUnits} units | Max ${z.height}' height | Front: ${z.f}' Rear: ${z.r}' Side: ${z.s}'`;
        }

        function updateBuilding(bw, bd, floors, z, lotD) {
            while(buildingGroup.children.length > 0) buildingGroup.remove(buildingGroup.children[0]);
            const h = floors * 12;
            const geo = new THREE.BoxGeometry(bw, h, bd);
            const mat = new THREE.MeshPhongMaterial({color: 0xffffff});
            const b = new THREE.Mesh(geo, mat);
            b.position.set(0, h/2, -(lotD/2) + z.f + (bd/2));
            b.castShadow = true;
            buildingGroup.add(b);

            // Procedural Details (Windows)
            for(let f=0; f<floors; f++) {
                for(let x=-bw/2 + 4; x<bw/2; x+=8) {
                    const win = new THREE.Mesh(new THREE.PlaneGeometry(3, 5), new THREE.MeshPhongMaterial({color: 0x334155}));
                    win.position.set(x, (f*12)+6, -(lotD/2) + z.f + bd + 0.1);
                    buildingGroup.add(win);
                }
            }
        }

        window.onload = init3D;
    </script>
</body>
</html>
