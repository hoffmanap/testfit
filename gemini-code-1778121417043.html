<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Paso 3D Feasibility Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        #rendererContainer { width: 100%; height: 600px; border-radius: 12px; overflow: hidden; background: #000; }
        .sidebar-scroll { height: calc(100vh - 120px); overflow-y: auto; }
        input[type=range] { accent-color: #4f46e5; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-[1600px] mx-auto">
        <header class="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm border border-gray-200">
            <div>
                <h1 class="text-2xl font-black text-gray-900 tracking-tight">EL PASO 3D FEASIBILITY <span class="text-indigo-600">PRO</span></h1>
                <p class="text-xs text-gray-500 font-medium">TITLE 20 COMPLIANCE ENGINE</p>
            </div>
            <div id="status-badge" class="px-3 py-1 bg-green-100 text-green-700 text-[10px] font-bold rounded-full uppercase">Compliance: OK</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 space-y-6 bg-white p-6 rounded-xl shadow-md border border-gray-200 sidebar-scroll">
                <section>
                    <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Site Parameters</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1">Zoning District</label>
                            <select id="zoning" class="w-full p-2 text-sm bg-gray-50 border border-gray-300 rounded-md" onchange="populateUses()"></select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1">Permitted Use</label>
                            <select id="use" class="w-full p-2 text-sm bg-gray-50 border border-gray-300 rounded-md" onchange="runAnalysis()"></select>
                        </div>
                        <div>
                            <div class="flex justify-between text-[10px] font-bold mb-1">
                                <span>Lot Width (ft)</span>
                                <span id="val-w" class="text-indigo-600">150</span>
                            </div>
                            <input type="range" id="width" min="20" max="500" value="150" class="w-full" oninput="runAnalysis()">
                        </div>
                        <div>
                            <div class="flex justify-between text-[10px] font-bold mb-1">
                                <span>Lot Depth (ft)</span>
                                <span id="val-d" class="text-indigo-600">200</span>
                            </div>
                            <input type="range" id="depth" min="20" max="500" value="200" class="w-full" oninput="runAnalysis()">
                        </div>
                    </div>
                </section>

                <section class="pt-4 border-t border-gray-100">
                    <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Program</h2>
                    <div class="space-y-4">
                        <div>
                            <div class="flex justify-between text-[10px] font-bold mb-1">
                                <span>Stories (12'/fl)</span>
                                <span id="val-floors" class="text-indigo-600">2</span>
                            </div>
                            <input type="range" id="floors" min="1" max="15" value="2" class="w-full" oninput="runAnalysis()">
                        </div>
                    </div>
                </section>

                <section class="pt-4 border-t border-gray-100">
                    <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Zoning Restriction Summary</h2>
                    <div id="zoning-summary" class="text-[11px] text-gray-600 space-y-2 leading-relaxed italic">
                        </div>
                </section>
            </div>

            <div class="lg:col-span-3 flex flex-col gap-4">
                <div id="rendererContainer" class="relative shadow-2xl">
                    <div class="absolute top-4 left-4 bg-black/50 text-white p-3 rounded text-[10px] font-mono leading-tight">
                        LEFT: Rotate | RIGHT: Pan | SCROLL: Zoom
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="bg-white p-4 rounded-xl border border-gray-200">
                        <p class="text-[10px] font-bold text-gray-400 uppercase">Site Area</p>
                        <p id="stat-lot-area" class="text-xl font-black">0 sf</p>
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-gray-200">
                        <p class="text-[10px] font-bold text-gray-400 uppercase">Allowable Units</p>
                        <p id="stat-max-units" class="text-xl font-black text-indigo-600">0</p>
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-gray-200">
                        <p class="text-[10px] font-bold text-gray-400 uppercase">Max Height</p>
                        <p id="stat-max-height" class="text-xl font-black text-red-500">0'</p>
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-gray-200">
                        <p id="coverage-label" class="text-[10px] font-bold text-gray-400 uppercase">Lot Coverage</p>
                        <p id="stat-coverage" class="text-xl font-black text-green-600">0%</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // FULL DATASET FROM APPENDIX B 
        const data = [
            { zone: "R-4", use: "Two-family dwelling (Duplex)", minLot: 7000, minW: 70, minD: 90, f: 10, r: 10, s: 5, height: 35, density: 2 },
            { zone: "R-5", use: "Two-family dwelling (Duplex)", minLot: 6000, minW: 50, minD: 90, f: 10, r: 10, s: 5, height: 35, density: 2 },
            { zone: "A-1", use: "Single-family dwelling", minLot: 4000, minW: 40, minD: 90, f: 10, r: 15, s: 5, height: 35, density: 1 },
            { zone: "A-1", use: "Two-family dwelling (Duplex)", minLot: 6000, minW: 50, minD: 90, f: 10, r: 15, s: 5, height: 35, density: 2 },
            { zone: "A-1", use: "Apartments and Mixed Use", minLot: 24000, minW: 60, minD: 100, f: 20, r: 25, s: 5, height: 45, density: 145, open: 0.5 },
            { zone: "A-2", use: "Apartments and Mixed Use", minLot: 6000, minW: 50, minD: 100, f: 0, r: 25, s: 5, height: 45, density: 145, open: 0.5 },
            { zone: "A-3", use: "Apartments and Mixed Use", minLot: 4000, minW: 50, minD: 80, f: 0, r: 20, s: 4, height: 45, density: 145, open: 0.3 },
            { zone: "C-1", use: "Apartments and Mixed Use", minLot: 4000, minW: 50, minD: 50, f: 0, r: 10, s: 5, height: 45, density: 145 }
        ];

        let scene, camera, renderer, controls, lot, building, parkingArea, stallGroup;

        function init3D() {
            const container = document.getElementById('rendererContainer');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111827);

            camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 1, 2000);
            camera.position.set(300, 250, 300);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(200, 400, 200);
            light.castShadow = true;
            scene.add(light);

            // Objects
            lot = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), new THREE.MeshPhongMaterial({ color: 0x4b5563, side: THREE.DoubleSide }));
            lot.rotation.x = -Math.PI / 2;
            scene.add(lot);

            parkingArea = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), new THREE.MeshPhongMaterial({ color: 0x111111 }));
            parkingArea.rotation.x = -Math.PI / 2;
            parkingArea.position.y = 0.05;
            scene.add(parkingArea);

            stallGroup = new THREE.Group();
            scene.add(stallGroup);

            // Textures for photorealism
            const loader = new THREE.TextureLoader();
            const bMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
            building = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), bMat);
            building.castShadow = true;
            scene.add(building);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        function populateZones() {
            const zSelect = document.getElementById('zoning');
            const zones = [...new Set(data.map(d => d.zone))];
            zones.forEach(z => {
                const opt = document.createElement('option');
                opt.value = opt.text = z;
                zSelect.appendChild(opt);
            });
            populateUses();
        }

        function populateUses() {
            const zone = document.getElementById('zoning').value;
            const uSelect = document.getElementById('use');
            uSelect.innerHTML = '';
            data.filter(d => d.zone === zone).forEach((d, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.text = d.use;
                uSelect.appendChild(opt);
            });
            runAnalysis();
        }

        function runAnalysis() {
            const zoneVal = document.getElementById('zoning').value;
            const useIdx = document.getElementById('use').value;
            const z = data.filter(d => d.zone === zoneVal)[useIdx];
            
            let w = parseInt(document.getElementById('width').value);
            let d = parseInt(document.getElementById('depth').value);
            const floors = parseInt(document.getElementById('floors').value);

            // Constraint: Min Lot Size 
            if (w < z.minW) w = z.minW;
            if (d < z.minD) d = z.minD;
            const lotArea = w * d;
            if (lotArea < z.minLot) {
                const scale = Math.sqrt(z.minLot / lotArea);
                w = Math.ceil(w * scale);
                d = Math.ceil(d * scale);
            }

            document.getElementById('val-w').innerText = w;
            document.getElementById('val-d').innerText = d;
            document.getElementById('val-floors').innerText = floors;

            // Zoning Logic
            const bHeight = floors * 12; // 12ft per floor
            const maxUnits = z.density > 2 ? Math.floor((lotArea / 43560) * z.density) : z.density;
            
            // Compliance Checks
            const heightOver = bHeight > z.height;
            document.getElementById('status-badge').innerText = heightOver ? "Height Violation" : "Compliance: OK";
            document.getElementById('status-badge').className = heightOver ? "px-3 py-1 bg-red-100 text-red-700 text-[10px] font-bold rounded-full uppercase" : "px-3 py-1 bg-green-100 text-green-700 text-[10px] font-bold rounded-full uppercase";

            // Visual Updates
            lot.scale.set(w, d, 1);
            
            const buildW = w - (z.s * 2);
            const buildD = d - z.f - z.r;
            
            // Parking Stalls (18' deep, 9' wide)
            const stallArea = maxUnits * 250; // Simplified area with aisle
            const pDepth = Math.min(buildD * 0.4, stallArea / buildW);
            
            parkingArea.scale.set(buildW, pDepth, 1);
            parkingArea.position.z = (d/2) - z.r - (pDepth / 2);

            // Draw Stalls
            while(stallGroup.children.length > 0) stallGroup.remove(stallGroup.children[0]);
            const numStalls = Math.floor(buildW / 9);
            for(let i=0; i<numStalls; i++) {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 18), new THREE.MeshBasicMaterial({color: 0xffffff}));
                line.rotation.x = -Math.PI / 2;
                line.position.set(-buildW/2 + (i*9), 0.08, (d/2) - z.r - 9);
                stallGroup.add(line);
            }

            const netBuildD = buildD - pDepth;
            building.scale.set(buildW, bHeight, netBuildD);
            building.position.set(0, bHeight/2, -(d/2) + z.f + (netBuildD/2));

            // Summary [cite: 1, 19, 21]
            document.getElementById('zoning-summary').innerHTML = `
                • Min Lot Required: ${z.minLot.toLocaleString()} sf (Width: ${z.minW}', Depth: ${z.minD}')<br>
                • Setbacks: Front ${z.f}', Rear ${z.r}', Side ${z.s}'<br>
                • Density Limit: ${z.density} units per acre (Max ${maxUnits} units)<br>
                • Height Limit: ${z.height}' (${Math.floor(z.height/12)} Stories)<br>
                ${z.open ? `• Open Space Req: ${(z.open*100)}%` : ''}
            `;

            document.getElementById('stat-lot-area').innerText = (w*d).toLocaleString() + " sf";
            document.getElementById('stat-max-units').innerText = maxUnits;
            document.getElementById('stat-max-height').innerText = z.height + "'";
            document.getElementById('stat-coverage').innerText = Math.round(((buildW * netBuildD) / lotArea) * 100) + "%";
        }

        init3D();
        populateZones();
    </script>
</body>
</html>
