<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Paso 3D Feasibility Pro - v5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        #rendererContainer { width: 100%; height: 100%; background: #1e293b; }
        .sidebar { height: 100vh; overflow-y: auto; box-shadow: 4px 0 10px rgba(0,0,0,0.1); }
        input[type=range] { accent-color: #4f46e5; height: 6px; }
    </style>
</head>
<body class="flex">

    <div class="sidebar w-96 bg-white p-6 z-10 border-r border-gray-200">
        <header class="mb-6">
            <h1 class="text-xl font-black text-gray-900 tracking-tight">EL PASO <span class="text-indigo-600">3D FEASIBILITY</span></h1>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Architectural Compliance Engine</p>
        </header>

        <div class="space-y-6">
            <section>
                <h2 class="text-xs font-bold text-gray-400 uppercase mb-3">Zoning & Use</h2>
                <div class="space-y-3">
                    <div>
                        <label class="block text-[11px] font-bold text-gray-700 mb-1">Zoning District</label>
                        <select id="zoning" class="w-full p-2 text-sm bg-gray-50 border border-gray-300 rounded-md" onchange="populateUses()"></select>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-gray-700 mb-1">Permitted Use</label>
                        <select id="use" class="w-full p-2 text-sm bg-gray-50 border border-gray-300 rounded-md" onchange="runAnalysis()"></select>
                    </div>
                </div>
            </section>

            <section class="pt-4 border-t border-gray-100">
                <h2 class="text-xs font-bold text-gray-400 uppercase mb-3">Site Dimensions</h2>
                <div class="space-y-4">
                    <div>
                        <div class="flex justify-between text-[11px] font-bold mb-1"><span>Lot Width (ft)</span><span id="val-w" class="text-indigo-600">150</span></div>
                        <input type="range" id="width" min="20" max="500" value="150" class="w-full" oninput="runAnalysis()">
                    </div>
                    <div>
                        <div class="flex justify-between text-[11px] font-bold mb-1"><span>Lot Depth (ft)</span><span id="val-d" class="text-indigo-600">200</span></div>
                        <input type="range" id="depth" min="20" max="500" value="200" class="w-full" oninput="runAnalysis()">
                    </div>
                </div>
            </section>

            <section class="pt-4 border-t border-gray-100">
                <h2 class="text-xs font-bold text-gray-400 uppercase mb-3">Building Program</h2>
                <div class="space-y-4">
                    <div>
                        <div class="flex justify-between text-[11px] font-bold mb-1"><span>Target Units</span><span id="val-units" class="text-indigo-600">10</span></div>
                        <input type="range" id="units" min="1" max="100" value="10" class="w-full" oninput="runAnalysis()">
                    </div>
                    <div>
                        <div class="flex justify-between text-[11px] font-bold mb-1"><span>Stories (12' fl)</span><span id="val-floors" class="text-indigo-600">3</span></div>
                        <input type="range" id="floors" min="1" max="12" value="3" class="w-full" oninput="runAnalysis()">
                    </div>
                </div>
            </section>

            <section id="zoning-summary-box" class="p-4 bg-indigo-50 rounded-lg border border-indigo-100">
                <h2 class="text-[11px] font-bold text-indigo-900 uppercase mb-2">Restriction Summary</h2>
                <div id="zoning-summary" class="text-[10px] text-indigo-800 space-y-1 font-medium"></div>
            </section>
        </div>
    </div>

    <div class="flex-1 relative">
        <div id="rendererContainer"></div>
        
        <div class="absolute bottom-6 left-6 flex gap-4 bg-white/90 p-3 rounded-lg border border-gray-200 shadow-xl text-[10px] font-bold uppercase">
            <div class="flex items-center"><span class="w-3 h-3 bg-[#4ade80] mr-2 rounded"></span> Setback/Open Space</div>
            <div class="flex items-center"><span class="w-3 h-3 bg-[#f5f5dc] mr-2 rounded border border-gray-300"></span> Buildable Area</div>
            <div class="flex items-center"><span class="w-3 h-3 bg-[#111] mr-2 rounded"></span> Parking</div>
        </div>
    </div>

    <script>
        // EXPANDED DATASET 
        const zoneData = [
            { zone: "R-4", use: "Two-family dwelling (Duplex)", minLot: 7000, minW: 70, minD: 90, f: 10, r: 10, s: 5, height: 35, density: 2 },
            { zone: "A-O", use: "Apartments and Mixed Use", minLot: 6000, minW: 50, minD: 90, f: 0, r: 25, s: 5, height: 45, density: 145 },
            { zone: "A-1", use: "Apartments and Mixed Use", minLot: 24000, minW: 60, minD: 100, f: 20, r: 25, s: 5, height: 45, density: 145, open: 0.5 },
            { zone: "A-2", use: "Apartments and Mixed Use", minLot: 6000, minW: 50, minD: 100, f: 0, r: 25, s: 5, height: 45, density: 145, open: 0.5 },
            { zone: "A-3", use: "Apartments and Mixed Use", minLot: 4000, minW: 50, minD: 80, f: 0, r: 20, s: 4, height: 45, density: 145, open: 0.3 },
            { zone: "A-4", use: "Apartments and Mixed Use", minLot: 4000, minW: 50, minD: 80, f: 0, r: 20, s: 4, height: 45, density: 145, open: 0.25 },
            { zone: "A-3/O", use: "Apartments and Mixed Use", minLot: 6000, minW: 50, minD: 90, f: 0, r: 10, s: 5, height: 45, density: 145 },
            { zone: "C-1", use: "Apartments and Mixed Use", minLot: 4000, minW: 50, minD: 50, f: 0, r: 10, s: 5, height: 45, density: 145 },
            { zone: "C-2", use: "Apartments and Mixed Use", minLot: 4000, minW: 50, minD: 50, f: 0, r: 10, s: 5, height: 45, density: 145 },
            { zone: "C-3", use: "Apartments and Mixed Use", minLot: 4000, minW: 50, minD: 50, f: 0, r: 10, s: 5, height: 45, density: 145 },
            { zone: "C-4", use: "Apartments and Mixed Use", minLot: 4000, minW: 50, minD: 50, f: 0, r: 10, s: 5, height: 60, density: 145 },
            { zone: "C-5", use: "Apartments and Mixed Use", minLot: 4000, minW: 50, minD: 50, f: 0, r: 0, s: 0, height: 100, density: 145 },
            { zone: "R-MU", use: "Apartments and Mixed Use", minLot: 43560, minW: 100, minD: 100, f: 0, r: 0, s: 0, height: 45, density: 145 },
            { zone: "G-MU", use: "Apartments and Mixed Use", minLot: 130680, minW: 150, minD: 150, f: 0, r: 0, s: 0, height: 200, density: 145 },
            { zone: "U-P", use: "Apartments and Mixed Use", minLot: 4000, minW: 50, minD: 100, f: 0, r: 0, s: 0, height: 45, density: 145 },
            { zone: "PR-1", use: "Apartments and Mixed Use", minLot: 43560, minW: 40, minD: 100, f: 10, r: 10, s: 10, height: 45, density: 145 },
            { zone: "PR-2", use: "Apartments and Mixed Use", minLot: 43560, minW: 40, minD: 100, f: 10, r: 10, s: 10, height: 45, density: 145 }
        ];

        let scene, camera, renderer, controls, lot, buildableZone, buildingGroup, stallLines;

        function init3D() {
            const container = document.getElementById('rendererContainer');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf1f5f9);

            camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 1, 3000);
            camera.position.set(350, 300, 350);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(200, 400, 100);
            sun.castShadow = true;
            scene.add(sun);

            // Layers
            lot = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), new THREE.MeshPhongMaterial({ color: 0x4ade80 })); // Setback color
            lot.rotation.x = -Math.PI / 2;
            scene.add(lot);

            buildableZone = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), new THREE.MeshPhongMaterial({ color: 0xf5f5dc })); // Beige
            buildableZone.rotation.x = -Math.PI / 2;
            buildableZone.position.y = 0.05;
            scene.add(buildableZone);

            buildingGroup = new THREE.Group();
            scene.add(buildingGroup);

            stallLines = new THREE.Group();
            scene.add(stallLines);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        function populateZones() {
            const zSelect = document.getElementById('zoning');
            const uniqueZones = [...new Set(zoneData.map(d => d.zone))];
            uniqueZones.forEach(z => {
                const opt = document.createElement('option');
                opt.value = opt.text = z;
                zSelect.appendChild(opt);
            });
            populateUses();
        }

        function populateUses() {
            const z = document.getElementById('zoning').value;
            const uSelect = document.getElementById('use');
            uSelect.innerHTML = '';
            zoneData.filter(d => d.zone === z).forEach((d, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.text = d.use;
                uSelect.appendChild(opt);
            });
            runAnalysis();
        }

        function runAnalysis() {
            const zVal = document.getElementById('zoning').value;
            const useIdx = document.getElementById('use').value;
            const z = zoneData.filter(d => d.zone === zVal)[useIdx];
            
            let w = parseInt(document.getElementById('width').value);
            let d = parseInt(document.getElementById('depth').value);
            let floors = parseInt(document.getElementById('floors').value);
            let targetUnits = parseInt(document.getElementById('units').value);

            // Min Lot Constraints 
            if (w < z.minW) w = z.minW;
            if (d < z.minD) d = z.minD;
            const lotArea = w * d;
            if (lotArea < z.minLot) {
                const ratio = Math.sqrt(z.minLot / lotArea);
                w = Math.ceil(w * ratio); d = Math.ceil(d * ratio);
            }

            // Unit Density Capping [cite: 4]
            const maxAllowed = z.density > 2 ? Math.floor((lotArea / 43560) * z.density) : z.density;
            if (targetUnits > maxAllowed) targetUnits = maxAllowed;
            document.getElementById('units').max = maxAllowed;
            
            // Height Capping (12ft/floor)
            if (floors * 12 > z.height) floors = Math.floor(z.height / 12);
            document.getElementById('floors').max = Math.floor(z.height / 12) || 1;

            // UI Update
            document.getElementById('val-w').innerText = w;
            document.getElementById('val-d').innerText = d;
            document.getElementById('val-units').innerText = targetUnits;
            document.getElementById('val-floors').innerText = floors;

            // Visual Geometry
            lot.scale.set(w, d, 1);
            
            const bW = Math.max(0, w - (z.s * 2));
            const bD = Math.max(0, d - z.f - z.r);
            buildableZone.scale.set(bW, bD, 1);
            buildableZone.position.z = (d/2) - z.r - (bD/2);

            // Architectural Building
            updateBuilding(bW, bD, floors, targetUnits, z, d);

            document.getElementById('zoning-summary').innerHTML = `
                District: ${z.zone} | Use: ${z.use}<br>
                • Min Lot: ${z.minLot} sf | Density: ${z.density}/ac<br>
                • Setbacks: F:${z.f}' R:${z.r}' S:${z.s}'<br>
                • Max Height: ${z.height}' (${Math.floor(z.height/12)} Floors)
            `;
        }

        function updateBuilding(bw, bd, floors, units, z, lotD) {
            while(buildingGroup.children.length > 0) buildingGroup.remove(buildingGroup.children[0]);
            
            const h = floors * 12;
            const pkgArea = units * 200; // 90 deg stall logic
            const buildDepth = Math.max(5, bd - (pkgArea / bw));
            
            // Main Massing
            const geometry = new THREE.BoxGeometry(bw, h, buildDepth);
            const material = new THREE.MeshPhongMaterial({ color: 0xffffff });
            const mainMesh = new THREE.Mesh(geometry, material);
            mainMesh.position.set(0, h/2, -(lotD/2) + z.f + (buildDepth/2));
            mainMesh.castShadow = true;
            buildingGroup.add(mainMesh);

            // Realistic Fenestration (Windows)
            const winGeo = new THREE.PlaneGeometry(3, 5);
            const winMat = new THREE.MeshPhongMaterial({ color: 0x334155, shininess: 100 });
            for(let f=0; f<floors; f++){
                for(let x=-bw/2 + 5; x<bw/2; x+=10){
                    const win = new THREE.Mesh(winGeo, winMat);
                    win.position.set(x, (f * 12) + 6, -(lotD/2) + z.f + buildDepth + 0.1);
                    buildingGroup.add(win);
                }
            }

            // Roof Parapet
            const paraGeo = new THREE.BoxGeometry(bw + 0.5, 2, buildDepth + 0.5);
            const para = new THREE.Mesh(paraGeo, new THREE.MeshPhongMaterial({color: 0xcbd5e1}));
            para.position.set(0, h + 1, -(lotD/2) + z.f + (buildDepth/2));
            buildingGroup.add(para);
        }

        init3D();
        populateZones();
    </script>
</body>
</html>
