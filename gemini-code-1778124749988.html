<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Paso 3D Feasibility Pro - v7.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        #rendererContainer { width: 100%; height: 100%; background: #0f172a; cursor: crosshair; }
        .sidebar { height: 100vh; overflow-y: auto; scrollbar-width: thin; }
        input[type=range] { accent-color: #4f46e5; height: 5px; width: 100%; }
        .control-group { border-bottom: 1px solid #f1f5f9; padding-bottom: 1rem; margin-bottom: 1rem; }
        #tooltip { 
            position: absolute; pointer-events: none; background: rgba(15, 23, 42, 0.9); 
            color: white; padding: 8px 12px; border-radius: 6px; font-size: 11px; 
            display: none; border: 1px solid #334155; z-index: 100; line-height: 1.4;
        }
    </style>
</head>
<body class="flex text-slate-800">

    <div id="tooltip"></div>

    <div class="sidebar w-85 bg-white p-5 z-10 border-r border-slate-200 flex flex-col">
        <header class="mb-4">
            <h1 class="text-lg font-black tracking-tighter">EL PASO <span class="text-indigo-600">3D PRO</span></h1>
            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Compliance Engine v7.0</p>
        </header>

        <div class="flex-1 overflow-y-auto pr-1">
            <div class="control-group">
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">Zoning & Use</label>
                <select id="zoning" class="w-full p-2 text-xs bg-slate-50 border border-slate-200 rounded mb-2" onchange="populateUses()"></select>
                <select id="use" class="w-full p-2 text-xs bg-slate-50 border border-slate-200 rounded" onchange="runAnalysis()"></select>
            </div>

            <div class="control-group">
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-3">Site & Building Geometry</label>
                <div class="space-y-3">
                    <div>
                        <div class="flex justify-between text-[10px] mb-1"><span>Lot (W x D)</span><span id="label-lot" class="font-bold text-indigo-600"></span></div>
                        <input type="range" id="width" min="20" max="500" value="150" oninput="runAnalysis()">
                        <input type="range" id="depth" min="20" max="500" value="200" class="mt-1" oninput="runAnalysis()">
                    </div>
                    <div>
                        <div class="flex justify-between text-[10px] mb-1"><span>Bldg (W x D)</span><span id="label-bldg" class="font-bold text-indigo-600"></span></div>
                        <input type="range" id="bWidth" min="10" max="500" value="60" oninput="runAnalysis()">
                        <input type="range" id="bDepth" min="10" max="500" value="60" class="mt-1" oninput="runAnalysis()">
                    </div>
                </div>
            </div>

            <div class="control-group">
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-3">Program</label>
                <div class="space-y-3">
                    <div>
                        <div class="flex justify-between text-[10px] mb-1"><span>Target Units</span><span id="label-units" class="font-bold text-indigo-600"></span></div>
                        <input type="range" id="units" min="1" max="145" value="12" oninput="runAnalysis()">
                    </div>
                    <div>
                        <div class="flex justify-between text-[10px] mb-1"><span>Stories</span><span id="label-floors" class="font-bold text-indigo-600"></span></div>
                        <input type="range" id="floors" min="1" max="15" value="3" oninput="runAnalysis()">
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 rounded-lg p-4 text-white">
                <h2 class="text-[10px] font-bold text-indigo-400 uppercase mb-3 tracking-widest">Analysis Summary</h2>
                <div class="space-y-2 text-[11px]">
                    <div class="flex justify-between"><span>Total GFA:</span><span id="sum-gfa" class="font-bold"></span></div>
                    <div class="flex justify-between"><span>Unit Count:</span><span id="sum-units" class="font-bold"></span></div>
                    <div class="flex justify-between"><span>Lot Coverage:</span><span id="sum-coverage" class="font-bold"></span></div>
                    <div class="flex justify-between"><span>Open Space:</span><span id="sum-open" class="font-bold"></span></div>
                    <div class="flex justify-between text-indigo-300"><span>Parking Spaces:</span><span id="sum-parking" class="font-bold"></span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="flex-1 relative">
        <div id="rendererContainer"></div>
        <div class="absolute top-6 right-6 text-white text-[10px] bg-black/40 p-2 rounded">HOVER ELEMENTS FOR DIMENSIONS</div>
    </div>

    <script>
        const zoneData = [
            { zone: "R-4", use: "Two-family dwelling (Duplex)", minLot: 7000, minW: 70, minD: 90, f: 10, r: 10, s: 5, height: 35, density: 2 },
            { zone: "A-1", use: "Apartments and Mixed Use", minLot: 24000, minW: 60, minD: 100, f: 20, r: 25, s: 5, height: 45, density: 145, open: 0.5 },
            { zone: "A-O", use: "Apartments and Mixed Use", minLot: 6000, minW: 50, minD: 90, f: 0, r: 25, s: 5, height: 45, density: 145 },
            { zone: "C-1", use: "Apartments and Mixed Use", minLot: 4000, minW: 50, minD: 50, f: 0, r: 10, s: 5, height: 45, density: 145 }
            // ... (Additional zones as previously defined)
        ];

        let scene, camera, renderer, controls, raycaster, mouse;
        let lot, buildableOutline, building, parkingLot, stalls;

        function init3D() {
            const container = document.getElementById('rendererContainer');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);
            camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 1, 3000);
            camera.position.set(300, 250, 300);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const light = new THREE.DirectionalLight(0xffffff, 0.6);
            light.position.set(100, 300, 100);
            light.castShadow = true;
            scene.add(light);

            lot = new THREE.Mesh(new THREE.PlaneGeometry(1,1), new THREE.MeshPhongMaterial({color: 0x16a34a, side: THREE.DoubleSide}));
            lot.rotation.x = -Math.PI / 2;
            lot.userData = { name: "Setback/Lot Area" };
            scene.add(lot);

            parkingLot = new THREE.Mesh(new THREE.PlaneGeometry(1,1), new THREE.MeshPhongMaterial({color: 0x1e293b}));
            parkingLot.rotation.x = -Math.PI / 2;
            parkingLot.position.y = 0.05;
            parkingLot.userData = { name: "Parking Area" };
            scene.add(parkingLot);

            building = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshPhongMaterial({color: 0xffffff}));
            building.castShadow = true;
            building.userData = { name: "Building Area" };
            scene.add(building);

            stalls = new THREE.Group();
            scene.add(stalls);

            window.addEventListener('mousemove', onMouseMove);
            populateZones();
            animate();
        }

        function onMouseMove(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects([lot, parkingLot, building]);
            const tooltip = document.getElementById('tooltip');

            if (intersects.length > 0) {
                const obj = intersects[0].object;
                const data = obj.userData;
                tooltip.style.display = 'block';
                tooltip.style.left = event.clientX + 15 + 'px';
                tooltip.style.top = event.clientY + 15 + 'px';
                tooltip.innerHTML = `
                    <b class="text-indigo-400">${data.name}</b><br/>
                    Dim: ${data.w.toFixed(1)}' x ${data.d.toFixed(1)}'<br/>
                    Area: ${data.area.toLocaleString()} sq ft
                `;
            } else {
                tooltip.style.display = 'none';
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        function populateZones() {
            const zSelect = document.getElementById('zoning');
            zSelect.innerHTML = '';
            zoneData.forEach(z => {
                const opt = document.createElement('option');
                opt.value = opt.text = z.zone;
                zSelect.appendChild(opt);
            });
            populateUses();
        }

        function populateUses() {
            const z = document.getElementById('zoning').value;
            const uSelect = document.getElementById('use');
            uSelect.innerHTML = '';
            zoneData.filter(d => d.zone === z).forEach((d, i) => {
                const opt = document.createElement('option');
                opt.value = i; opt.text = d.use;
                uSelect.appendChild(opt);
            });
            runAnalysis();
        }

        function runAnalysis() {
            const zVal = document.getElementById('zoning').value;
            const useIdx = document.getElementById('use').value;
            const z = zoneData.filter(d => d.zone === zVal)[useIdx];
            
            let lw = parseInt(document.getElementById('width').value);
            let ld = parseInt(document.getElementById('depth').value);
            
            // Enforce Min Lot Area/Width/Depth
            lw = Math.max(lw, z.minW); ld = Math.max(ld, z.minD);
            if ((lw * ld) < z.minLot) { 
                const r = Math.sqrt(z.minLot / (lw * ld)); 
                lw = Math.ceil(lw * r); ld = Math.ceil(ld * r); 
            }

            const maxBW = lw - (z.s * 2);
            const maxBD = ld - z.f - z.r;
            
            let bw = Math.min(parseInt(document.getElementById('bWidth').value), maxBW);
            let bd = Math.min(parseInt(document.getElementById('bDepth').value), maxBD);
            
            const floors = parseInt(document.getElementById('floors').value);
            const units = parseInt(document.getElementById('units').value);

            // Summary Metrics
            const gfa = bw * bd * floors;
            const coverage = ((bw * bd) / (lw * ld)) * 100;
            const openSpace = z.open ? (z.open * 100) + "%" : "N/A";

            // Update 3D Geometry & Hover Data
            lot.scale.set(lw, ld, 1);
            lot.userData = { name: "Total Site Area", w: lw, d: ld, area: lw * ld };

            // Parking Stalls Implementation (9x18)
            while(stalls.children.length > 0) stalls.remove(stalls.children[0]);
            const cols = Math.floor(maxBW / 9);
            const rows = Math.ceil(units / cols);
            const pDepth = rows * 18 + (rows > 1 ? 24 : 0); // Include drive aisle if more than 1 row
            
            parkingLot.scale.set(maxBW, pDepth, 1);
            parkingLot.position.z = (ld/2) - z.r - (pDepth / 2);
            parkingLot.userData = { name: "Parking Area", w: maxBW, d: pDepth, area: maxBW * pDepth };

            for(let i = 0; i < units; i++) {
                const col = i % cols;
                const row = Math.floor(i / cols);
                const rectGeo = new THREE.EdgesGeometry(new THREE.PlaneGeometry(9, 18));
                const rect = new THREE.LineSegments(rectGeo, new THREE.LineBasicMaterial({color: 0xffffff}));
                rect.rotation.x = -Math.PI/2;
                rect.position.set(-maxBW/2 + (col * 9) + 4.5, 0.08, (ld/2) - z.r - (row * 18) - 9);
                stalls.add(rect);
            }

            const h = floors * 12;
            building.scale.set(bw, h, bd);
            building.position.set(0, h/2, -(ld/2) + z.f + (bd/2));
            building.userData = { name: "Building footprint", w: bw, d: bd, area: bw * bd };

            // Update UI Labels
            document.getElementById('label-lot').innerText = lw + "x" + ld;
            document.getElementById('label-bldg').innerText = bw + "x" + bd;
            document.getElementById('label-units').innerText = units;
            document.getElementById('label-floors').innerText = floors;

            // Summary Feed
            document.getElementById('sum-gfa').innerText = gfa.toLocaleString() + " SF";
            document.getElementById('sum-units').innerText = units;
            document.getElementById('sum-coverage').innerText = coverage.toFixed(1) + "%";
            document.getElementById('sum-open').innerText = openSpace;
            document.getElementById('sum-parking').innerText = units + " Spaces";
        }

        window.onload = init3D;
    </script>
</body>
</html>
